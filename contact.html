<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Crumb Bakery - Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">The Daily Crumb</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
            <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
            <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
            <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
            <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5" style="max-width: 600px;">
      <h1 class="text-center mb-4 fw-bold">Contact Us</h1>
      <p class="text-center text-muted mb-4">Have an order question? Send us a message!</p>

      <div class="p-4 border rounded bg-light shadow-sm">
        <form id="bakeryForm" onsubmit="validateContactForm(event)">
          <div class="mb-3">
            <label for="clientName" class="form-label">Your Name</label>
            <input type="text" class="form-control" id="clientName" placeholder="John Doe">
          </div>
          <div class="mb-3">
            <label for="clientEmail" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="clientEmail" placeholder="name@example.com">
          </div>
          <div class="mb-3">
            <label for="clientMessage" class="form-label">Message / Custom Order Request</label>
            <textarea class="form-control" id="clientMessage" rows="4" placeholder="Tell us what you need..."></textarea>
          </div>
          <button type="submit" class="btn btn-warning w-100 fw-bold">Submit Message</button>
        </form>
      </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 The Daily Crumb Bakery. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
